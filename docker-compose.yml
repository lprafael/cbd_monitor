services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER:-cbd_auth}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-XZbk17L9Fo4YF}
      POSTGRES_DB: ${AUTH_DB_NAME:-cbd_auth}
    ports:
      - "${AUTH_DB_PORT_HOST:-5433}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./postgres-auth/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${AUTH_DB_USER:-cbd_auth}", "-d", "${AUTH_DB_NAME:-cbd_auth}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cbd-monitor-network

  cbd-monitor-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbd-monitor-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTH_DB_HOST=postgres-auth
      - AUTH_DB_PORT=5432
      - AUTH_DB_NAME=${AUTH_DB_NAME:-cbd_auth}
      - AUTH_DB_USER=${AUTH_DB_USER:-cbd_auth}
      - AUTH_DB_PASSWORD=${AUTH_DB_PASSWORD:-XZbk17L9Fo4YF}
      - HOST=0.0.0.0
      - PORT=5000
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - cbd-monitor-network

  cbd-monitor-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:5001}
    container_name: cbd-monitor-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - cbd-monitor-backend
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cbd-monitor-network

networks:
  cbd-monitor-network:
    driver: bridge

volumes:
  postgres_auth_data:
