services:
  cbd-monitor-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbd-monitor-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - AUTH_DB_HOST=${AUTH_DB_HOST:-172.16.222.222}
      - AUTH_DB_PORT=${AUTH_DB_PORT:-5433}
      - AUTH_DB_NAME=${AUTH_DB_NAME:-cbd_auth}
      - AUTH_DB_USER=${AUTH_DB_USER}
      - AUTH_DB_PASSWORD=${AUTH_DB_PASSWORD}
      - HOST=0.0.0.0
      - PORT=5000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cbd-monitor-network

  cbd-monitor-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://172.16.222.222:5001}
    container_name: cbd-monitor-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - cbd-monitor-backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - cbd-monitor-network

networks:
  cbd-monitor-network:
    driver: bridge
