server {
    listen 80;
    
    # Carpeta raíz base
    root /usr/share/nginx/html;
    index index.html;

    # Captura CUALQUIER ruta (raíz o subcarpeta) y lo manda al index.html
    location / {
        try_files $uri $uri/ /cbd_monitor/index.html /index.html;
    }

    # Asegura que los archivos estáticos se encuentren si vienen con el prefijo
    location /cbd_monitor/ {
        alias /usr/share/nginx/html/cbd_monitor/;
        try_files $uri $uri/ /cbd_monitor/index.html;
    }

    # Proxies para el API (ambas variantes)
    location /api/ {
        proxy_pass http://cbd-monitor-backend:5000/;
    }

    location /cbd_monitor/api/ {
        proxy_pass http://cbd-monitor-backend:5000/;
    }
}