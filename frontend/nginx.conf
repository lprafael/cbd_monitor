server {
    listen 80;
    
    # Soporte para la raíz (IP:8080)
    # location / {
    #     root   /usr/share/nginx/html;
    #     index  index.html index.htm;
    #     try_files $uri $uri/ /index.html;
    # }
    location /cbd_monitor {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Soporte para el dominio (sistemas.mopc.gov.py/cbd_monitor)
    location /cbd_monitor/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /cbd_monitor/index.html;
    }

    # Proxy para el API (funciona para ambos)
    location /api/ {
        proxy_pass http://cbd-monitor-backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Proxy para el API cuando se accede por la subcarpeta
    location /cbd_monitor/api/ {
        proxy_pass http://cbd-monitor-backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}