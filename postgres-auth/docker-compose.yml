# PostgreSQL dedicado para autenticación/usuarios (login).
# Desplegar en el servidor, ej: /home/user/postgres-auth/
# Uso: docker compose up -d

services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cbd_auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cbd_auth}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      # Valores fijos para evitar expansión de variables en el host (y warnings tipo "uH")
      test: ["CMD", "pg_isready", "-U", "cbd_auth", "-d", "cbd_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_auth_data:
